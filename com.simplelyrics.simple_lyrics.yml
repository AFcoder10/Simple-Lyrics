Categories:
  - Multimedia
License: GPL-3.0-only
SourceCode: https://github.com/AFcoder10/Simple-Lyrics
IssueTracker: https://github.com/AFcoder10/Simple-Lyrics/issues

AutoName: Simple Lyrics

RepoType: git
Repo: https://github.com/AFcoder10/Simple-Lyrics.git

Builds:
  - versionName: 1.0.3
    versionCode: 4
    commit: 514adb0e7c43692228a854f1385e3a599cb46c40
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*f-droid-flutter:\s*(.*)/\1/p" pubspec.yaml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - sed -i -E '/implementation.*com\.google\.android\.play/d; /com\.google\.android\.play.*=>/d' "$$flutter$$/packages/flutter_tools/gradle/src/main/groovy/flutter.groovy" || true
      - sed -i -E '/implementation.*com\.google\.android\.play/d; /com\.google\.android\.play.*=>/d; /play-core/d' "$$flutter$$/packages/flutter_tools/gradle/src/main/kotlin/flutter.gradle.kts" || true
      - sed -i '/play-core/d' "$$flutter$$/packages/flutter_tools/gradle/src/main/groovy/flutter.groovy" || true
      - sed -i '/play-core/d' "$$flutter$$/packages/flutter_tools/gradle/src/main/kotlin/flutter.gradle.kts" || true
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.0.3
CurrentVersionCode: 4
