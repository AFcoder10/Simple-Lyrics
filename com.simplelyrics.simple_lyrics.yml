Categories:
  - Multimedia
License: GPL-3.0-only
SourceCode: https://github.com/AFcoder10/Simple-Lyrics
IssueTracker: https://github.com/AFcoder10/Simple-Lyrics/issues

AutoName: Simple Lyrics

RepoType: git
Repo: https://github.com/AFcoder10/Simple-Lyrics.git

Builds:
  - versionName: 1.0.2
    versionCode: 3
    commit: 4c2a9cd85dc3aabbcef769be0d9b96d8ed1b02d5
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*f-droid-flutter:\s*(.*)/\1/p" pubspec.yaml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - sed -i -e '/play.core/d' $$flutter$$/packages/flutter_tools/gradle/src/main/groovy/flutter.groovy
        || sed -i -e '/play.core/d' $$flutter$$/packages/flutter_tools/gradle/src/main/kotlin/flutter.gradle.kts
        || true
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scandelete:
      - .pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.0.2
CurrentVersionCode: 3
